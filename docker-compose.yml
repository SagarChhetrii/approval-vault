version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: approval-vault-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - vault-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: approval-vault-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - vault-net

volumes:
  uploads_data:

networks:
  vault-net:
    driver: bridge
